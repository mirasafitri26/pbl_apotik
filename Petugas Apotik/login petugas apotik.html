<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Apotik</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:10px;
    }

    .container{
      width:100%;
      max-width:1400px;
      height:95vh;
      background:white;
      border-radius:4px;
      overflow:hidden;
      display:flex;
    }

    /* LEFT */
    .left{
      width:38%;
      background:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .login-box{
      width:100%;
      max-width:320px;
    }

    .login-box h1{
      font-size:42px;
      font-weight:600;
      margin-bottom:25px;
      color:#111;
    }

    .role{
      display:flex;
      gap:10px;
      margin-bottom:25px;
    }

    .role button{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#005f6b;
      color:white;
      font-size:14px;
      cursor:pointer;
      transition:0.3s;
    }

    .role button:hover{
      background:#014852;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      font-size:13px;
      margin-bottom:8px;
      color:#222;
      font-weight:500;
    }

    .input-group input{
      width:100%;
      padding:13px 14px;
      border:1px solid #ddd;
      border-radius:8px;
      outline:none;
      font-size:13px;
    }

    .password-box{
      position:relative;
    }

    .password-box span{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      color:#888;
      font-size:14px;
      cursor:pointer;
    }

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      font-size:12px;
    }

    .options a{
      color:#2759ff;
      text-decoration:none;
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#005f6b;
      color:white;
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      margin-bottom:25px;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#014852;
    }

    .divider{
      text-align:center;
      color:#999;
      font-size:12px;
      margin-bottom:20px;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:'';
      position:absolute;
      top:50%;
      width:35%;
      height:1px;
      background:#ddd;
    }

    .divider::before{
      left:0;
    }

    .divider::after{
      right:0;
    }

    .social{
      display:flex;
      gap:10px;
      margin-bottom:25px;
    }

    .social button{
      flex:1;
      padding:10px;
      border:1px solid #ddd;
      background:white;
      border-radius:8px;
      font-size:12px;
      cursor:pointer;
    }

    .signup{
      text-align:center;
      font-size:13px;
      color:#555;
    }

    .signup a{
      text-decoration:none;
      color:#2759ff;
      font-weight:500;
    }

    /* RIGHT */
    .right{
      width:62%;
      overflow:hidden;
      border-top-left-radius:40px;
      border-bottom-left-radius:40px;
    }

    .right img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* RESPONSIVE */
    @media(max-width:900px){
      .container{
        flex-direction:column;
        height:auto;
      }

      .left{
        width:100%;
        padding:40px 25px;
      }

      .right{
        width:100%;
        height:300px;
        border-radius:0;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT -->
    <div class="left">
      <div class="login-box">

        <h1>Masuk</h1>

        <div class="role">
          <button>Pasien</button>
          <button>Petugas</button>
        </div>

        <div class="input-group">
          <label>Alamat Email</label>
          <input type="email" placeholder="Masukkan Email Anda">
        </div>

        <div class="input-group">
          <label>kata Sandi</label>

          <div class="password-box">
            <input type="password" placeholder="Masukkan kata sandi">
            <span>👁</span>
          </div>
        </div>

        <div class="options">
          <label>
            <input type="checkbox">
            Ingatlah selama 30 hari
          </label>

          <a href="#">Lupa kata Sandi</a>
        </div>

        <button class="login-btn">Masuk</button>

      
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <img src="c:\Users\LENOVO\Downloads\desain uiux\foto rs.png">
    </div>

  </div>

</body>
</html>
