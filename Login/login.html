
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Apotik</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:10px;
    }

    .container{
      width:100%;
      max-width:1400px;
      height:95vh;
      background:white;
      border-radius:4px;
      overflow:hidden;
      display:flex;
    }

    /* LEFT */
    .left{
      width:38%;
      background:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .login-box{
      width:100%;
      max-width:320px;
    }

    .login-box h1{
      font-size:42px;
      font-weight:600;
      margin-bottom:25px;
      color:#111;
    }

    .role{
      display:flex;
      gap:10px;
      margin-bottom:25px;
    }

    .role button{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#005f6b;
      color:white;
      font-size:14px;
      cursor:pointer;
      transition:0.3s;
    }

    .role button:hover{
      background:#014852;
    }

    .role button:disabled{
      cursor:not-allowed;
      opacity:1;
      background:#005f6b;
      color:white;
      pointer-events:none;
    }

    .role button:disabled:hover{
      background:#005f6b;
    }

    .role button.active{
      background:#8B5E3C;
      color:white;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      font-size:13px;
      margin-bottom:8px;
      color:#222;
      font-weight:500;
    }

    .input-group input{
      width:100%;
      padding:13px 14px;
      border:1px solid #ddd;
      border-radius:8px;
      outline:none;
      font-size:13px;
    }

    .password-box{
      position:relative;
    }

    .password-box span{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      color:#888;
      font-size:14px;
      cursor:pointer;
    }

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      font-size:12px;
    }

    .options a{
      color:#2759ff;
      text-decoration:none;
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#005f6b;
      color:white;
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      margin-bottom:25px;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#014852;
    }

    .divider{
      text-align:center;
      color:#999;
      font-size:12px;
      margin-bottom:20px;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:'';
      position:absolute;
      top:50%;
      width:35%;
      height:1px;
      background:#ddd;
    }

    .divider::before{
      left:0;
    }

    .divider::after{
      right:0;
    }

    /* RIGHT */
    .right{
      width:62%;
      overflow:hidden;
      border-top-left-radius:40px;
      border-bottom-left-radius:40px;
    }

    .right img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* RESPONSIVE */
    @media(max-width:900px){
      .container{
        flex-direction:column;
        height:auto;
      }

      .left{
        width:100%;
        padding:40px 25px;
      }

      .right{
        width:100%;
        height:300px;
        border-radius:0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left">
      <div class="login-box">
        <h1>Masuk</h1>

        <div class="role">
          <button type="button" id="btn-Pasien" disabled>Pasien</button>
          <button type="button" id="btn-Petugas" onclick="pilihRole('Petugas')">Petugas</button>
        </div>

        <div class="input-group">
          <label>Alamat Email</label>
          <input type="email" placeholder="Masukkan Email Anda">
        </div>

        <div class="input-group">
          <label>Kata Sandi</label>
          <div class="password-box">
            <input type="password" id="password" placeholder="Masukkan kata sandi">
            <span onclick="togglePassword()"></span>
          </div>
        </div>

        <div class="options">
          <label>
            <input type="checkbox">
            Ingatlah selama 30 hari
          </label>
          <a href="#">Lupa kata Sandi</a>
        </div>

        <button class="login-btn" onclick="login()">Masuk</button>
      </div>
    </div>

    <div class="right">
      <img src="../img/foto rs.png">
    </div>
  </div>

<script>
  const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:5000/api'
    : 'https://farmasi4b06.vps-poliban.my.id/api';

  function togglePassword() {
    const passwordInput = document.getElementById("password");
    passwordInput.type = passwordInput.type === "password" ? "text" : "password";
  }

  let roleDipilih = "";

  function pilihRole(role){
    roleDipilih = role;
    
    // Reset status active tombol
    document.getElementById("btn-Pasien").classList.remove("active");
    document.getElementById("btn-Petugas").classList.remove("active");
    
    // Tambah class active pada tombol yang dipilih
    document.getElementById("btn-" + role).classList.add("active");
  }

  function login(){
    const email = document.querySelector('input[type="email"]').value.trim();
    const password = document.getElementById("password").value;

    if(email === "" || password === ""){
      alert("Email dan password harus diisi!");
      return;
    }

    // PENTING: Jika user lupa klik role tapi emailnya diisi admin/petugas, otomatis kita set rolenya ke 'Petugas'
    if(roleDipilih === "" && (email.includes('admin') || email.includes('petugas'))){
      roleDipilih = "Petugas";
    }

    // Try server authentication, fallback to local checks on failure
    (async () => {
      try {
        const payload = { email, password, role: roleDipilih };
        const resp = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const data = await resp.json();

        if (data && (data.success === true || data.status === 'success')) {
          if (data.token) localStorage.setItem('api_token', data.token);

          const serverRole = (data.role || data.role_user || data.user_role || '').toLowerCase();
          
          if (serverRole.includes('admin') || serverRole.includes('petugas') || roleDipilih === 'Petugas'){
            if (serverRole.includes('admin')) {
              window.location.href = "../Admin Apotik/dashboard_apotik.html";
            } else {
              window.location.href = "../Petugas Apotik/petugas_apotik.html";
            }
            return;
          }
          
          // Redirect langsung untuk pasien (jika ada) tanpa alert sukses
          return;
        } else {
          alert("Email atau password salah!");
          return;
        }

      } catch (err) {
        console.warn('API login gagal, mencoba fallback lokal:', err);

        // Fallback lokal - langsung pindah halaman tanpa alert sukses
        if(roleDipilih === 'Petugas' || email.includes('admin') || email.includes('petugas')){
          if(email === 'adminapotik@gmail.com' && password === 'uusganteng123'){
            window.location.href = '../Admin Apotik/dashboard_apotik.html';
            return;
          } else if(email === 'petugasapotik@gmail.com' && password === 'uusganteng123'){
            window.location.href = '../Petugas Apotik/petugas_apotik.html';
            return;
          } else {
            alert('Email atau password salah!');
            return;
          }
        }

        alert('Email atau password salah!');
      }
    })();
  }
</script>
</body>
</html>
