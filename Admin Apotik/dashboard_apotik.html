<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Antrian Apotik (View Only)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
    --primary:#005F6B;
    --secondary:#36D6C4;
    --bg:#F4F5F7;
    --card:#FFFFFF;
    --border:#E5E7EB;
    --text:#1F2937;
    --muted:#6B7280;
    --warning:#F4B400;
    --success:#1DB89A;
    --danger:#F12828;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    background:#ECECEC;
    display:flex;
    min-height:100vh;
}
.sidebar{
    width:220px;
    background:#F8F8F8;
    padding:18px;
    display:flex;
    flex-direction:column;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
}
.logo{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}
.logo img{
    width:120px;
}
.top-sidebar{
    display:flex;
    flex-direction:column;
    gap:18px;
}
.menu-box{
    background:white;
    padding:16px 18px;
    border-radius:10px;
    display:flex;
    align-items:center;
    gap:12px;
    color:#005F6B;
    font-weight:600;
    box-shadow:0 3px 8px rgba(0,0,0,0.10);
    cursor:pointer;
}
.menu-icon{
    width:20px;
    height:20px;
}
.menu-title{
    font-size:13px;
}
.logout{
    margin-top:auto;
    background:#FF1E1E;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 4px 8px rgba(255,0,0,.2);
}
.logout img{
    width:16px;
}
.main{
    flex:1;
    margin-left:220px;
    padding:18px 24px;
}
.wrapper{
    background:#F3F3F3;
    border-radius:24px;
    padding:18px 22px;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.header-title{
    font-size:17px;
    font-weight:700;
    color:#222;
}
.header-sub{
    font-size:11px;
    color:#9CA3AF;
}
.profile{
    display:flex;
    align-items:center;
    gap:12px;
}
.profile img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
}
.profile-text{
    font-size:12px;
    line-height:1.4;
}
.profile-text strong{
    font-size:13px;
}
.big-card{
    margin-top:18px;
    background:var(--primary);
    border-radius:22px;
    padding:24px 28px;
    color:white;
}
.big-left small{
    color:#58D8C8;
    font-size:15px;
    font-weight:600;
}
.big-left h1{
    font-size:72px;
    line-height:1;
    margin-top:2px;
}
.big-left p{
    margin-top:6px;
    font-size:25px;
    font-weight:500;
}
.badge{
    display:inline-block;
    margin-top:12px;
    background:#36D6C4;
    padding:5px 14px;
    border-radius:10px;
    font-size:13px;
    font-weight:500;
}
.stats{
    display:flex;
    gap:20px;
    margin-top:20px;
}
.stat{
    flex:1;
    background:white;
    padding:16px 20px;
    border-radius:18px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.stat-title{
    color:#38C8B4;
    font-weight:600;
    font-size:14px;
}
.stat h2{
    font-size:42px;
    line-height:1.1;
}
.stat small{
    color:#777;
}
.orange{ color:#F4B400; }
.green{ color:#009C8C; }
.content{
    margin-top:18px;
    display:flex;
    gap:18px;
}
.card{
    background:white;
    border-radius:14px;
    padding:14px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.list{ flex:2.3; }
.skip{ flex:1; }
.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}
.card-header h4{
    font-size:14px;
    font-weight:500;
}
.tag{
    background:#43D6C4;
    color:white;
    padding:3px 12px;
    border-radius:12px;
    font-size:11px;
}
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #D9E1E7;
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:12px;
}
.item.active{
    background:#EAF8F7;
    border:1px solid #6CCFC4;
}
.left{
    display:flex;
    align-items:center;
    gap:14px;
}
.kode{
    width:48px;
    height:48px;
    background:#005F6B;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:700;
    font-size:20px;
}
.info .nama{
    font-size:13px;
    font-weight:700;
    color:#005F6B;
}
.info .resep{
    font-size:12px;
    color:#34BFAE;
}
.info .obat{
    font-size:11px;
    color:#9CA3AF;
}
.status{
    padding:5px 12px;
    border-radius:12px;
    font-size:11px;
    font-weight:600;
}
.dipanggil{
    background:#CCFBF1;
    color:#00796B;
}
.menunggu{
    background:#FEF3C7;
    color:#A16207;
}
.skip-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}
.skip-label{
    background:#FF5B5B;
    color:white;
    padding:3px 12px;
    border-radius:10px;
    font-size:11px;
}
.skip-count{
    background:#FF5B5B;
    width:18px;
    height:18px;
    border-radius:50%;
    color:white;
    font-size:11px;
    display:flex;
    justify-content:center;
    align-items:center;
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-content">
        <div class="logo">
            <img src="../img/Logo Rs.png">
        </div>
        <div class="top-sidebar">
            <div class="menu-box" onclick="window.location.href='dashboard_apotik.html'">
                <img src="../img/Rumah.png" class="menu-icon">
                <div class="menu-title">Dashboard</div>
            </div>
            <div class="menu-box" onclick="window.location.href='Admin_Apotik.html'">
                <img src="../img/obat.png" class="menu-icon">
                <div class="menu-title">Data Obat</div>
            </div>
        </div>
    </div>
    <button class="logout" onclick="logout()">
        <img src="../img/panah lg.png"> Log Out
    </button> 
</div>

<div class="main">
    <div class="wrapper">
        <div class="header">
            <div>
                <div class="header-title">Pemanggilan Antrian Obat</div>
                <div class="header-sub">Antrian Obat</div>
            </div>
            <div class="profile">
                <img src="../img/Foto Admin.png">
                <div class="profile-text">
                    <strong>Petugas Apotik</strong><br>
                    Mutia Amelia
                </div>
            </div>
        </div>

        <div class="big-card">
            <div class="big-left">
                <small id="active-status">Sedang Di Panggil</small>
                <h1 id="active-kode">-</h1>
                <p id="active-nama">Tidak Ada Antrian</p>
                <div class="badge" id="active-resep">Resep #-</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-title">Total Antrian</div>
                <h2 id="stat-total">0</h2>
                <small>hari ini</small>
            </div>
            <div class="stat">
                <div class="stat-title">Menunggu</div>
                <h2 class="orange" id="stat-menunggu">0</h2>
                <small>belum dipanggil</small>
            </div>
            <div class="stat">
                <div class="stat-title">Selesai</div>
                <h2 class="green" id="stat-selesai">0</h2>
                <small>obat di serahkan</small>
            </div>
        </div>

        <div class="content">
            <div class="card list">
                <div class="card-header">
                    <h4>Daftar Antrian Resep Tersedia</h4>
                    <div class="tag" id="badge-menunggu">0 Menunggu</div>
                </div>
                <div id="antrian-container"></div>
            </div>

            <div class="card skip">
                <div class="skip-top">
                    <div class="skip-label">Skip</div>
                    <div class="skip-count" id="stat-skip">0</div>
                </div>
                <div id="skip-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = "https://farmasi4b06.vps-poliban.my.id/api";
let dataAntrian = [];

function mapStatusFromAPI(apiStatus) {
    const status = String(apiStatus || "").toUpperCase();
    if (status.includes("MENUNGGU")) return "Menunggu";
    if (status.includes("DIPROSES") || status.includes("DIPANGGIL") || status.includes("DIPANGGIL")) return "Dipanggil";
    if (status.includes("SELESAI")) return "Selesai";
    if (status.includes("SKIP")) return "Skip";
    return "Menunggu";
}

function normalizeAntrianResponse(result) {
    if (Array.isArray(result)) {
        return result;
    }
    return result && (result.data || result.list || result.antrian) ? (result.data || result.list || result.antrian) : [];
}

async function loadDataDariStorage() {
    try {
        const response = await fetch(`${API_BASE}/antrian-pengambilan-obat`, {
            headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();
        const antrianList = normalizeAntrianResponse(result);

        dataAntrian = antrianList.map(item => ({
            idAntrian: item.ID_ANTRIAN || item.id_antrian || item.id,
            kode: item.NOMOR_ANTRIAN || item.nomor_antrian || `A${item.ID_ANTRIAN}`,
            nama: item.NAMA_PASIEN || item.nama_pasien || "Pasien",
            resep: `Resep #${item.ID_RESEP || item.id_resep}`,
            obat: item.DAFTAR_OBAT || item.obat || "Obat",
            status: mapStatusFromAPI(item.STATUS || item.status)
        })).sort((a, b) => {
            const order = { Dipanggil: 0, Menunggu: 1, Selesai: 2, Skip: 3 };
            if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
            return a.kode.localeCompare(b.kode, undefined, { numeric: true, sensitivity: 'base' });
        });

        updateDashboard();
    } catch (error) {
        console.error("Gagal memuat data:", error);
    }
}

function updateDashboard() {
    const antrianContainer = document.getElementById('antrian-container');
    const skipContainer = document.getElementById('skip-container');

    antrianContainer.innerHTML = "";
    skipContainer.innerHTML = "";

    let total = dataAntrian.length;
    let menunggu = 0;
    let selesai = 0;
    let skipCount = 0;

    let pasienAktif = dataAntrian.find(p => p.status === "Dipanggil");

    if (pasienAktif) {
        document.getElementById('active-status').innerText = "Sedang Di Panggil";
        document.getElementById('active-kode').innerText = pasienAktif.kode;
        document.getElementById('active-nama').innerText = pasienAktif.nama;
        document.getElementById('active-resep').innerText = pasienAktif.resep;
    } else {
        document.getElementById('active-status').innerText = "Tidak Ada Antrian Aktif";
        document.getElementById('active-kode').innerText = "-";
        document.getElementById('active-nama').innerText = "Tidak Ada Antrian";
        document.getElementById('active-resep').innerText = "Resep #-";
    }

    dataAntrian.forEach(pasien => {
        if (pasien.status === "Menunggu") menunggu++;
        if (pasien.status === "Selesai") selesai++;
        if (pasien.status === "Skip") skipCount++;

        const statusClass = pasien.status === 'Dipanggil'
            ? 'dipanggil'
            : pasien.status === 'Menunggu'
                ? 'menunggu'
                : pasien.status === 'Selesai'
                    ? 'selesai'
                    : 'skip';

        const itemHtml = `
            <div class="item ${pasien.status === 'Dipanggil' ? 'active' : ''}">
                <div class="left">
                    <div class="kode">${pasien.kode}</div>
                    <div class="info">
                        <div class="nama">${pasien.nama}</div>
                        <div class="resep">${pasien.resep}</div>
                        <div class="obat">${pasien.obat}</div>
                    </div>
                </div>
                <div class="status ${statusClass}">
                    ${pasien.status}
                </div>
            </div>
        `;

        if (pasien.status === "Skip") {
            const skipHtml = `
                <div class="item">
                    <div class="left">
                        <div class="kode" style="background:#FF5B5B;">${pasien.kode}</div>
                        <div class="info">
                            <div class="nama">${pasien.nama}</div>
                            <div class="resep">${pasien.resep}</div>
                        </div>
                    </div>
                    <div class="status skip">${pasien.status}</div>
                </div>
            `;
            skipContainer.innerHTML += skipHtml;
        } else {
            antrianContainer.innerHTML += itemHtml;
        }
    });

    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-menunggu').innerText = menunggu;
    document.getElementById('stat-selesai').innerText = selesai;
    document.getElementById('stat-skip').innerText = skipCount;
    document.getElementById('badge-menunggu').innerText = `${menunggu} Menunggu`;
}

setInterval(loadDataDariStorage, 3000);

window.onload = function() {
    loadDataDariStorage();
};

function logout() {
    window.location.href = "../Login/login.html";
}
</script>
</body>
</html>
